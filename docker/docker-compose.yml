services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
    restart: unless-stopped
    networks:
      - ciq_network

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://ciq:ciq_secret@postgres:5432/construction_iq
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=4000
    restart: unless-stopped
    networks:
      - ciq_network

  ai-service:
    build:
      context: ..
      dockerfile: apps/ai-service/Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - ciq_network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ciq
      POSTGRES_PASSWORD: ciq_secret
      POSTGRES_DB: construction_iq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ciq -d construction_iq"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ciq_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ciq_network

networks:
  ciq_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
